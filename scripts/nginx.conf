# KonnexCore Nginx site config.
#
# Templated — @PROJECT_DIR@ and @SERVER_NAME@ are substituted by
# setup_vps.sh at install time. Edit the *template* (this file), not
# the rendered copy under /etc/nginx/sites-available/.
#
# Layout:
#   * Static dashboard served from $project/dashboard/dist
#   * /api/* reverse-proxied to the local backend on port 8000
#   * /docs and /openapi.json proxied through too (FastAPI Swagger)
#   * SPA fallback: unknown paths return /index.html
#
# To enable HTTPS, run scripts/setup_letsencrypt.sh — Certbot will
# rewrite this file in place to add the listen 443 ssl block and
# the redirect from 80 to 443.

server {
    listen 80;
    listen [::]:80;
    server_name @SERVER_NAME@;

    # Static dashboard build.
    root @PROJECT_DIR@/dashboard/dist;
    index index.html;

    # Aggressive caching for hashed assets, none for the SPA shell.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { access_log off; }
    location = /favicon.ico { access_log off; return 204; }

    # Reverse proxy the FastAPI backend.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # FastAPI auto-docs and OpenAPI schema.
    location = /docs        { proxy_pass http://127.0.0.1:8000/docs; }
    location = /redoc       { proxy_pass http://127.0.0.1:8000/redoc; }
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # SPA fallback — every unknown path serves the React shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sensible defaults.
    server_tokens off;
    client_max_body_size 16m;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/javascript application/json
        application/xml application/xml+rss text/xml image/svg+xml;
}
